  - title: Selected Projects
    layout: projects
    content:
      - title: Swin-Trajectory
        subtitle: Vision-based End-to-End Driving · Waymo Open Dataset Challenge (CVPR 2025)
        badge: 3rd Place
        image: images/waymo_challenge.png
        keywords: [E2E Autonomous Driving, Vision-based Planning, Transformer, Swin]
        links:
          - icon: fas fa-trophy
            label: Challenge Page
            url: https://cvpr2025.wad.vision/
        description: |
          A minimalist transformer-based waypoint planner that takes a single front-facing camera
          and structured ego-vehicle history as input. A lightweight **Swin Transformer** backbone
          cross-attends to dynamic waypoint queries to efficiently regress future trajectories —
          competitive with much heavier multi-sensor baselines.

          Deep thanks to my teammates and supervisor — and to *RideFlux* for technical support
          and collaboration.

      - title: Autonomous Valet Parking System
        subtitle: Capstone Design Project — full-stack autonomy
        badge: Top 3 / 30 · Solo Award
        image: videos/demo_pj.gif
        keywords: [Valet Parking, Semantic Segmentation, RGB-D Calibration, BEV, Adaptive Pure-pursuit]
        links:
          - icon: fas fa-link
            label: Project Notes
            url: https://www.notion.so/Capstone-Design-1dc8b1bb16e68037bc99d5a71575ab11
        description:
          End-to-end pipeline — **Perception → Planning → Control** — for a self-parking vehicle,
          built solo. Integrated BEV-based perception, motion planning, and an adaptive pure-pursuit
          controller into a single coherent system. The cornerstone of my academic path into autonomy.

