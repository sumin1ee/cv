about_content: |
  I'm a Master's researcher at the **Intelligent Robotics & Computer Vision Lab**, Hanyang University,
  working on vision-centric autonomous driving.

  My current research focuses on **Gaussian Splatting for autonomous driving** and **online mapping** —
  asking how modern 3D scene representations can reshape the next generation of perception and planning.

