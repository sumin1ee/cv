<section class="section section-splat" id="live-demo">
  <header class="section-head">
    <span class="section-num">01</span>
    <h2 class="section-title">Live Demo</h2>
    <span class="section-rule"></span>
    <span class="splat-tag">3D Gaussian Splatting</span>
  </header>

  <div class="splat-card" id="splat-card">
    <div class="splat-canvas-wrap" id="splat-canvas-wrap">
      <div class="splat-loader" id="splat-loader">
        <div class="splat-spinner"></div>
        <span class="splat-loader-text">loading splats · 1.5 MB</span>
      </div>
      <div class="splat-mount" id="splat-mount"></div>
      <div class="splat-hint" id="splat-hint">drag · zoom · explore</div>
    </div>

    <div class="splat-meta">
      <p class="splat-desc">
        Trained from a 3D model with <strong>splatfacto</strong> over 300 synthetic views,
        rendered in your browser with <strong>Three.js</strong>. Compressed to 1.5 MB.
      </p>
      <div class="splat-stack">
        <span class="splat-pill">300 views</span>
        <span class="splat-pill">30k iters</span>
        <span class="splat-pill">75k gaussians</span>
        <span class="splat-pill">1.5 MB ksplat</span>
      </div>
    </div>
  </div>
</section>
